name: Android

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test, lint, and package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run Android verification
        shell: pwsh
        run: .\android\build.ps1 test lint assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LawPDF-android-debug
          path: C:\tmp\lawpdf-android\build\app\outputs\apk\debug\app-debug.apk
          if-no-files-found: error
