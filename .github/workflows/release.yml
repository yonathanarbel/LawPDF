name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Rust
        shell: pwsh
        run: |
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Fetch pinned CatBoost runtime
        shell: pwsh
        run: .\scripts\fetch-catboost-windows.ps1

      - name: Verify release manifest and assets
        shell: pwsh
        run: python tools\verify_release_manifest.py --platform windows --require-platform-library

      - name: Build release
        shell: pwsh
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage target executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\lawpdf.exe target\release\lawpdf.exe -Force

      - name: Build portable zip
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\package-windows.ps1 -Configuration release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME -like "v*") {
            $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          }
          $isccCandidates = @(
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"),
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"),
            (Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe")
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe was not found after installing Inno Setup." }
          & $iscc .\packaging\windows\LawPDF.iss /DAppVersion=$version

      - name: Create Windows SHA-256 manifest fragment
        shell: pwsh
        run: |
          $assets = @(
            "LawPDFSetup-x64.exe",
            "LawPDF-windows-portable-x64.zip"
          )
          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath (Join-Path "dist" $asset) -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $asset"
          }
          Set-Content -LiteralPath dist\SHA256SUMS-windows.txt -Value $lines -Encoding ascii

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LawPDF-windows-portable-x64
          path: dist/LawPDF-windows-portable-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LawPDFSetup-x64
          path: dist/LawPDFSetup-x64.exe

      - name: Upload Windows checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: LawPDF-SHA256SUMS-windows
          path: dist/SHA256SUMS-windows.txt

  macos:
    name: macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Rust
        run: rustup default stable

      - name: Verify release manifest and assets
        run: python3 tools/verify_release_manifest.py --platform macos --require-platform-library

      - name: Build and verify app bundle
        run: bash scripts/package-macos.sh

      - name: Create macOS SHA-256 manifest fragment
        run: (cd dist && shasum -a 256 LawPDF-macos.zip > SHA256SUMS-macos.txt)

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: LawPDF-macos
          path: dist/LawPDF-macos.zip

      - name: Upload macOS checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: LawPDF-SHA256SUMS-macos
          path: dist/SHA256SUMS-macos.txt

  publish:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: LawPDF-windows-portable-x64
          path: dist

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: LawPDFSetup-x64
          path: dist

      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: LawPDF-macos
          path: dist

      - name: Download Windows checksum fragment
        uses: actions/download-artifact@v4
        with:
          name: LawPDF-SHA256SUMS-windows
          path: checksums

      - name: Download macOS checksum fragment
        uses: actions/download-artifact@v4
        with:
          name: LawPDF-SHA256SUMS-macos
          path: checksums

      - name: Assemble and verify SHA-256 manifest
        run: |
          cat checksums/SHA256SUMS-windows.txt checksums/SHA256SUMS-macos.txt > dist/SHA256SUMS.txt
          (cd dist && sha256sum --check SHA256SUMS.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          assets=(
            dist/LawPDF-windows-portable-x64.zip
            dist/LawPDFSetup-x64.exe
            dist/LawPDF-macos.zip
            dist/SHA256SUMS.txt
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "LawPDF $GITHUB_REF_NAME" \
              --notes "Verified Windows x64 and macOS packages."
          fi
